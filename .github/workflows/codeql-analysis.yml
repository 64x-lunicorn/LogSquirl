name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 22 * * 4'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        config:
          - os: linux
            arch: x64
            qt_version: 6.8.2
            qt_arch: linux_gcc_64
            qt_modules: qt5compat
            languages: ['cpp']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.config.languages }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file. 
        # Prefix the list here with "+" to use these queries and those in the config file.
        # queries: ./path/to/local/query, your-org/your-repo/queries@main

    - uses: ./.github/actions/agent-setup

    - name: Prepare compiler env
      run: |
        echo "CC=gcc-13" >> $GITHUB_ENV
        echo "CXX=g++-13" >> $GITHUB_ENV

    - name: configure
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLOGSQUIRL_GENERIC_CPU=ON -DLOGSQUIRL_USE_SENTRY=OFF -DLOGSQUIRL_USE_VECTORSCAN=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..

    - name: build
      run: |
        cmake --build build -t logsquirl

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
