name: "Make CI Release"

on:
  workflow_dispatch:
    inputs:
      ci-run-id:
        description: "Run ID of CI workflow"
        required: false
      beta-tag:
        description: "Beta release tag (e.g. v26.04.0-beta.1). Leave empty for standard CI release."
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Download artifacts for last successful CI workflow
      if: ${{ !github.event.inputs.ci-run-id }}
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: ci-build.yml
        workflow_conclusion: success

    - name: Download artifacts for CI workflow with provided run id
      if: ${{ github.event.inputs.ci-run-id }}
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: ci-build.yml
        run_id: ${{ github.event.inputs.ci-run-id }}

    - name: Initialize version
      run: echo "LOGSQUIRL_VERSION=`cat logsquirl_version/logsquirl_version.txt`" >> $GITHUB_ENV

    - name: Display structure of downloaded files
      run: ls -R ./packages-*

    - name: Setup Sentry CLI
      uses: mathrix-education/setup-sentry-cli@0.1.0
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
      with:
        token: ${{ secrets.SENTRY_TOKEN }}
        organization: logsquirl
        project: logsquirl

    - name: Create Sentry release
      shell: sh
      run: |
        sentry-cli releases new $LOGSQUIRL_VERSION
        sentry-cli releases set-commits --auto $LOGSQUIRL_VERSION

    - name: Upload symbols linux
      shell: sh
      run: |
        xz -d ./packages-jammy/logsquirl_jammy.debug.xz
        xz -d ./packages-noble/logsquirl_noble.debug.xz
        xz -d ./packages-oracle/logsquirl_oracle.debug.xz
        xz -d ./packages-fedora/logsquirl_fedora.debug.xz
        xz -d ./packages-appimage/logsquirl_appimage.debug.xz
        sentry-cli upload-dif ./packages-jammy/logsquirl_jammy.debug ./packages-jammy/logsquirl_jammy
        sentry-cli upload-dif ./packages-noble/logsquirl_noble.debug  ./packages-noble/logsquirl_noble
        sentry-cli upload-dif ./packages-oracle/logsquirl_oracle.debug ./packages-oracle/logsquirl_oracle
        sentry-cli upload-dif ./packages-fedora/logsquirl_fedora.debug ./packages-fedora/logsquirl_fedora
        sentry-cli upload-dif ./packages-appimage/logsquirl_appimage.debug  ./packages-appimage/logsquirl_appimage

    - name: Upload symbols mac
      shell: sh
      run: |
        sentry-cli upload-dif ./packages-macos-intel-qt6/logsquirl-x64.app/Contents/MacOS/logsquirl ./packages-macos-intel-qt6/logsquirl-x64.dSym
        sentry-cli upload-dif ./packages-macos-arm-qt6/logsquirl-arm64.app/Contents/MacOS/logsquirl ./packages-macos-arm-qt6/logsquirl-arm64.dSym

    - name: Upload symbols win
      shell: sh
      run: |
        sentry-cli upload-dif ./packages-windows-x64-qt6/logsquirl-$LOGSQUIRL_VERSION-x64-Qt6-pdb.zip

    - name: Cleanup release artifacts
      shell: sh
      run: |
        rm -rf ./packages-jammy/logsquirl_jammy
        rm -rf ./packages-noble/logsquirl_noble
        rm -rf ./packages-oracle/logsquirl_oracle
        rm -rf ./packages-fedora/logsquirl_fedora
        rm -rf ./packages-appimage/logsquirl_appimage
        rm -rf ./packages-macos-intel-qt6/logsquirl-x64.app
        rm -rf ./packages-macos-arm-qt6/logsquirl-arm64.app
        mkdir ./linux-debug
        mv ./packages-jammy/logsquirl_jammy.debug ./linux-debug
        mv ./packages-noble/logsquirl_noble.debug ./linux-debug
        mv ./packages-oracle/logsquirl_oracle.debug ./linux-debug
        mv ./packages-fedora/logsquirl_fedora.debug ./linux-debug
        mv ./packages-appimage/logsquirl_appimage.debug ./linux-debug
        tar -cJf ./linux-debug/logsquirl-$LOGSQUIRL_VERSION-symbols.tar.xz ./linux-debug/*
        rm ./linux-debug/*.debug

    - name: Prepare binary artifacts
      shell: sh
      run: |
        mkdir ./packages-bin
        mv ./packages-appimage/logsquirl_deps.tar.xz ./packages-bin/logsquirl-$LOGSQUIRL_VERSION-deps.tar.xz
        ar p  ./packages-jammy/logsquirl-$LOGSQUIRL_VERSION-jammy.deb data.tar.gz > ./packages-bin/logsquirl-$LOGSQUIRL_VERSION-bin.tar.gz
        mv ./logsquirl_version/logsquirl_version.txt ./packages-bin

    - name: Prepare checksums
      shell: sh
      run: |
        sha256sum --binary ./packages-bin/* ./packages-jammy/* ./packages-noble/* ./packages-oracle/* ./packages-fedora/* ./packages-appimage/*  > ./packages-bin/logsquirl-$LOGSQUIRL_VERSION-sha256.txt
        
    - name: Release win
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: ${{ secrets.LOGSQUIRL_GITHUB_TOKEN }}
        automatic_release_tag: continuous-win
        prerelease: true
        files: |
          ./packages-windows-x64-qt6/*

    - name: Release linux
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: ${{ secrets.LOGSQUIRL_GITHUB_TOKEN }}
        automatic_release_tag: continuous-linux
        prerelease: true
        files: |
          ./packages-jammy/*
          ./packages-noble/*
          ./packages-oracle/*
          ./packages-fedora/*
          ./packages-appimage/*
          ./packages-bin/*
          ./linux-debug/*

    - name: Release mac
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: ${{ secrets.LOGSQUIRL_GITHUB_TOKEN }}
        automatic_release_tag: continuous-osx
        prerelease: true
        files: |
          ./packages-macos-intel-qt6/*
          ./packages-macos-arm-qt6/*

    # --- Beta release (only when beta-tag input is provided) ---
    - name: Release beta win
      if: ${{ github.event.inputs.beta-tag }}
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: ${{ secrets.LOGSQUIRL_GITHUB_TOKEN }}
        automatic_release_tag: ${{ github.event.inputs.beta-tag }}-win
        prerelease: true
        title: "Beta ${{ github.event.inputs.beta-tag }} (Windows)"
        files: |
          ./packages-windows-x64-qt6/*

    - name: Release beta linux
      if: ${{ github.event.inputs.beta-tag }}
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: ${{ secrets.LOGSQUIRL_GITHUB_TOKEN }}
        automatic_release_tag: ${{ github.event.inputs.beta-tag }}-linux
        prerelease: true
        title: "Beta ${{ github.event.inputs.beta-tag }} (Linux)"
        files: |
          ./packages-jammy/*
          ./packages-noble/*
          ./packages-oracle/*
          ./packages-fedora/*
          ./packages-appimage/*
          ./packages-bin/*
          ./linux-debug/*

    - name: Release beta mac
      if: ${{ github.event.inputs.beta-tag }}
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: ${{ secrets.LOGSQUIRL_GITHUB_TOKEN }}
        automatic_release_tag: ${{ github.event.inputs.beta-tag }}-osx
        prerelease: true
        title: "Beta ${{ github.event.inputs.beta-tag }} (macOS)"
        files: |
          ./packages-macos-intel-qt6/*
          ./packages-macos-arm-qt6/*

    - name: Update latest.json with beta version
      if: ${{ github.event.inputs.beta-tag }}
      shell: bash
      env:
        BETA_TAG: ${{ github.event.inputs.beta-tag }}
      run: |
        # Extract version from tag (strip leading 'v' if present)
        BETA_VERSION="${BETA_TAG#v}"
        BETA_URL="https://github.com/64x-lunicorn/LogSquirl/releases/tag/${BETA_TAG}"

        # Update latest.json using jq
        jq --arg ver "$BETA_VERSION" --arg url "$BETA_URL" \
           '.beta = $ver | .beta_url = $url' latest.json > latest.json.tmp \
           && mv latest.json.tmp latest.json

        # Commit and push the updated latest.json
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add latest.json
        git commit -m "chore: update latest.json with beta ${BETA_VERSION} [skip ci]"
        git push





   
