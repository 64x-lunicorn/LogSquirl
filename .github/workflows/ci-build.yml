name: "CI Build"

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'website/**'
      - BUILD.md
      - CODE_OF_CONDUCT.md
      - CONTRIBUTING.md
      - README.md
      - latest.json
      - .gitignore
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'website/**'
      - BUILD.md
      - CODE_OF_CONDUCT.md
      - CONTRIBUTING.md
      - README.md
      - latest.json
      - .gitignore
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  SaveVersion:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/logsquirl-version

      - name: Save version 
        run: echo $LOGSQUIRL_VERSION > logsquirl_version.txt

      - uses: actions/upload-artifact@v4
        with:
          name: logsquirl_version
          path: 'logsquirl_version.txt'
          if-no-files-found: error

  Linux:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      matrix:
        config:
          #- os: oraclelinux
          #  os_version: 7
          #  arch: x64
          #  check_command: yum install -y --setopt tsflags=test /usr/local/logsquirl*.rpm
          #  cpack_gen: RPM
          #  artifacts_id: oracle7
          #  package_suffix: rpm
          #  check_container: oraclelinux:7
          #  container_root: docker/oracle7
          #  container: variar/klogg_oracle7
          #  cmake_opts: -DLOGSQUIRL_USE_SENTRY=OFF -DLOGSQUIRL_USE_LTO=OFF -DLOGSQUIRL_USE_HYPERSCAN=OFF

          - os: oraclelinux
            os_version: 8
            arch: x64
            check_command: yum install -y --setopt tsflags=test /usr/local/logsquirl*.rpm
            cpack_gen: RPM
            artifacts_id: oracle
            package_suffix: rpm
            check_container: oraclelinux:8
            container_root: docker/oracle8
            container: variar/klogg_oracle8
            cmake_opts: -DCMAKE_BUILD_WITH_INSTALL_RPATH=on -DLOGSQUIRL_USE_VECTORSCAN=OFF -DLOGSQUIRL_USE_HYPERSCAN=ON

          - os: ubuntu_jammy
            os_version: 22.04
            arch: x64
            check_command: apt-get update && apt install --dry-run /usr/local/logsquirl*.deb
            cpack_gen: DEB
            artifacts_id: jammy
            package_suffix: deb
            check_container: ubuntu:22.04
            container_root: docker/ubuntu22.04
            container: variar/klogg_ubuntu22.04
            cmake_opts:

          - os: ubuntu_noble
            os_version: 24.04
            arch: x64
            check_command: apt-get update && apt install --dry-run /usr/local/logsquirl*.deb
            cpack_gen: DEB
            artifacts_id: noble
            package_suffix: deb
            check_container: ubuntu:24.04
            container_root: docker/ubuntu24.04
            container: variar/klogg_ubuntu24.04
            cmake_opts:

          - os: ubuntu_appimage
            os_version: 22.04
            arch: x64
            artifacts_id: appimage
            package_suffix: AppImage
            container_root: docker/ubuntu22.04
            container: variar/klogg_ubuntu22.04
            cmake_opts:


    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      #- uses: satackey/action-docker-layer-caching@v0.0.11
      #  # Ignore the failure of a step and avoid terminating the job.
      #  continue-on-error: true
      
      - name: Build container 
        run: |
          cd ${{ matrix.config.container_root }}
          docker build -t ${{ matrix.config.container }} .

      - uses: ./.github/actions/logsquirl-version
      - uses: ./.github/actions/prepare-workspace-env
      - uses: ./.github/actions/docker-build
      - uses: ./.github/actions/docker-run-tests
      - uses: ./.github/actions/docker-package
          
# Final upload of all packages
      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.config.artifacts_id }}
          path: '${{ env.LOGSQUIRL_BUILD_ROOT }}/packages/*'
          if-no-files-found: error      

  Mac:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: macos
            runner: macos-26-intel
            qt_version: 6.10.3
            qt_arch: clang_64
            qt_modules: qt5compat
            arch: x64
            artifacts_id: macos-intel-qt6
            cmake_opts: -DLOGSQUIRL_OSX_DEPLOYMENT_TARGET=15.0 -DLOGSQUIRL_USE_SENTRY=OFF
          - os: macos
            runner: macos-26
            qt_version: 6.10.3
            qt_arch: clang_64
            qt_modules: qt5compat
            arch: arm64
            artifacts_id: macos-arm-qt6
            cmake_opts: -DLOGSQUIRL_OSX_DEPLOYMENT_TARGET=15.0 -DLOGSQUIRL_USE_SENTRY=OFF

    runs-on: ${{ matrix.config.runner }}
    steps:
      - uses: actions/checkout@v4

#Install build deps
      - name: Set brew env
        run: |
          echo "HOMEBREW_NO_ANALYTICS=1" >> $GITHUB_ENV
          echo "HOMEBREW_NO_AUTO_UPDATE=1" >> $GITHUB_ENV
          echo "HOMEBREW_NO_INSTALL_CLEANUP=1" >> $GITHUB_ENV

      - name: Brew deps
        run: |
          brew install ragel

      - uses: ./.github/actions/agent-setup
      - uses: ./.github/actions/logsquirl-version
      - uses: ./.github/actions/prepare-workspace-env
      - uses: ./.github/actions/agent-build
      - uses: ./.github/actions/agent-run-tests
      - uses: ./.github/actions/agent-package-mac
        with:
          p12-file-base64: ${{ secrets.CODESIGN_BASE64 }}
          p12-password: ${{ secrets.CODESIGN_PASSWORD }}
          notarization-username: ${{ secrets.NOTARIZATION_USERNAME }}
          notarization-team: ${{ secrets.NOTARIZATION_TEAM }}
          notarization-password: ${{ secrets.NOTARIZATION_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.config.artifacts_id }}
          path: '${{ env.LOGSQUIRL_BUILD_ROOT }}/packages/*' 
          if-no-files-found: error

  Windows:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows
            runner: windows-2025
            qt_version: 6.10.3
            qt_modules: qt5compat
            qt_arch: win64_msvc2022_64
            arch: x64
            ssl_arch: -x64
            cmake_opts: 
            artifacts_id: windows-x64-qt6

    runs-on: ${{ matrix.config.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache openssl
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\openssl-3
          key: OpensslCache-3-choco-x64

      - name: Install openssl
        if: ${{ steps.cache-openssl.outputs.cache-hit != 'true' }} 
        run: |
          choco install openssl --no-progress -y
          $sslDir = (Get-ChildItem 'C:\Program Files\OpenSSL*' -Directory -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $sslDir) { $sslDir = (Get-ChildItem 'C:\' -Directory -Filter 'OpenSSL*' -Recurse -Depth 1 -ErrorAction SilentlyContinue | Where-Object { Test-Path "$($_.FullName)\bin" } | Select-Object -First 1).FullName }
          Write-Host "Found OpenSSL at: $sslDir"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\openssl-3\x64\bin"
          Copy-Item "$sslDir\bin\*.dll" "${{ github.workspace }}\openssl-3\x64\bin\"

      - name: Set openssl paths
        shell: sh
        run: |
          echo "SSL_DIR=${{ github.workspace }}\openssl-3\${{ matrix.config.arch }}\bin" >> $GITHUB_ENV
          echo "SSL_ARCH=${{ matrix.config.ssl_arch }}" >> $GITHUB_ENV 

      - uses: ./.github/actions/agent-setup
      - uses: ./.github/actions/logsquirl-version
      - uses: ./.github/actions/prepare-workspace-env
      
      - name: Prepare dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.config.arch }}

      - uses: ./.github/actions/agent-build
      - uses: ./.github/actions/agent-run-tests
      - uses: ./.github/actions/agent-package-win
        with:
          s3-key-id: ${{ secrets.WIN_CS_KEY_ID }}
          s3-secret: ${{ secrets.WIN_CS_SECRET }}
          s3-bucket: ${{ secrets.WIN_CS_BUCKET }}
     
# Final upload of all packages
      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.config.artifacts_id }}
          path: '${{ env.LOGSQUIRL_BUILD_ROOT }}/packages/*'
          if-no-files-found: error
