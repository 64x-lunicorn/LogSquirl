    - name: Win portable
      shell: cmd
      run: |
        packaging\windows\prepare_release.cmd

    - name: Win installer
      uses: joncloud/makensis-action@v4
      with:
        script-file: logsquirl.nsi
        arguments: "-DVERSION=%LOGSQUIRL_VERSION% -DPLATFORM=%LOGSQUIRL_ARCH% -DQT_MAJOR=%LOGSQUIRL_QT%" 
    
    - name: Win package
      shell: cmd
      run: |
        md %LOGSQUIRL_BUILD_ROOT%\packages
        xcopy logsquirl-%LOGSQUIRL_VERSION%-%LOGSQUIRL_ARCH%-%LOGSQUIRL_QT%-portable.zip %LOGSQUIRL_BUILD_ROOT%\packages /y
        xcopy logsquirl-%LOGSQUIRL_VERSION%-%LOGSQUIRL_ARCH%-%LOGSQUIRL_QT%-pdb.zip %LOGSQUIRL_BUILD_ROOT%\packages /y
        xcopy logsquirl-%LOGSQUIRL_VERSION%-%LOGSQUIRL_ARCH%-%LOGSQUIRL_QT%-setup.exe %LOGSQUIRL_BUILD_ROOT%\packages /y

