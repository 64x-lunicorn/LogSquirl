name: "Prepare logsquirl mac packages"
description: "Sign, package, notarize and staple the macOS app bundle into a DMG"
inputs:
  p12-file-base64:
    required: true
  p12-password:
    required: true
  notarization-username:
    required: true
  notarization-team:
    required: true
  notarization-password:
    required: true

runs:
  using: "composite"
  steps:
    # ── 1. Import signing certificates ────────────────────────────────────
    - name: Mac prepare codesign
      id: prepare-codesign
      if: ${{ github.event_name != 'pull_request' }}
      uses: apple-actions/import-codesign-certs@v3
      with:
        p12-file-base64: ${{ inputs.p12-file-base64 }}
        p12-password: ${{ inputs.p12-password }}

    # ── 2. Prepare the .app bundle ────────────────────────────────────────
    - name: Mac create PkgInfo
      shell: sh
      run: |
        printf 'APPL????' > $LOGSQUIRL_BUILD_ROOT/output/logsquirl.app/Contents/PkgInfo

    - name: Mac deploy Qt
      shell: sh
      run: |
        cd $LOGSQUIRL_BUILD_ROOT
        macdeployqt ./output/logsquirl.app -always-overwrite -verbose=2

    - name: Mac deploy Qt fixing
      shell: sh
      run: |
        python3 $LOGSQUIRL_BUILD_ROOT/macdeployqtfix.py \
          $LOGSQUIRL_BUILD_ROOT/output/logsquirl.app/Contents/MacOS/logsquirl \
          $LOGSQUIRL_QT_DIR

    # ── 2b. Repair Qt framework bundle symlinks ──────────────────────────
    #
    # macdeployqt (especially Qt 6) copies files instead of creating the
    # required versioned symlink structure. Without proper symlinks codesign
    # fails with "bundle format is ambiguous (could be app or framework)".
    # We rebuild the canonical layout:
    #   Versions/Current -> A  (symlink)
    #   QtFoo            -> Versions/Current/QtFoo  (symlink)
    #   Resources        -> Versions/Current/Resources  (symlink)
    - name: Mac fix framework symlinks
      shell: sh
      run: |
        set -euo pipefail
        APP="$LOGSQUIRL_BUILD_ROOT/output/logsquirl.app"
        FWDIR="$APP/Contents/Frameworks"

        for framework in "$FWDIR"/*.framework; do
          [ -d "$framework" ] || continue
          fw_name=$(basename "$framework" .framework)
          echo "Fixing framework: $fw_name"

          # Ensure Versions/A exists with the binary
          if [ ! -d "$framework/Versions/A" ]; then
            mkdir -p "$framework/Versions/A"
            # Move the top-level binary into Versions/A if it exists
            if [ -f "$framework/$fw_name" ] && [ ! -L "$framework/$fw_name" ]; then
              mv "$framework/$fw_name" "$framework/Versions/A/$fw_name"
            fi
          fi

          # Move Resources into Versions/A if it is a real directory at top level
          if [ -d "$framework/Resources" ] && [ ! -L "$framework/Resources" ]; then
            if [ -d "$framework/Versions/A/Resources" ]; then
              rm -rf "$framework/Versions/A/Resources"
            fi
            mv "$framework/Resources" "$framework/Versions/A/Resources"
          fi

          # Move _CodeSignature into Versions/A if present at top level
          if [ -d "$framework/_CodeSignature" ] && [ ! -L "$framework/_CodeSignature" ]; then
            rm -rf "$framework/Versions/A/_CodeSignature"
            mv "$framework/_CodeSignature" "$framework/Versions/A/_CodeSignature"
          fi

          # Replace Versions/Current real directory with symlink -> A
          if [ -d "$framework/Versions/Current" ] && [ ! -L "$framework/Versions/Current" ]; then
            rm -rf "$framework/Versions/Current"
          fi
          if [ ! -L "$framework/Versions/Current" ]; then
            ln -s A "$framework/Versions/Current"
          fi

          # Replace top-level binary with symlink -> Versions/Current/<name>
          if [ -f "$framework/$fw_name" ] && [ ! -L "$framework/$fw_name" ]; then
            rm "$framework/$fw_name"
          fi
          if [ ! -L "$framework/$fw_name" ]; then
            ln -s "Versions/Current/$fw_name" "$framework/$fw_name"
          fi

          # Replace top-level Resources with symlink -> Versions/Current/Resources
          if [ ! -L "$framework/Resources" ]; then
            ln -s "Versions/Current/Resources" "$framework/Resources"
          fi

          echo "  OK: $(ls -la "$framework/$fw_name" | tail -1)"
        done

        echo "=== Framework structure verification ==="
        for framework in "$FWDIR"/*.framework; do
          fw_name=$(basename "$framework" .framework)
          echo "$fw_name:"
          echo "  Current: $(readlink "$framework/Versions/Current" || echo 'NOT A SYMLINK')"
          echo "  Binary:  $(readlink "$framework/$fw_name" || echo 'NOT A SYMLINK')"
          echo "  Res:     $(readlink "$framework/Resources" || echo 'NOT A SYMLINK')"
        done

    # ── 3. Resolve signing identities ─────────────────────────────────────
    - name: Set packaging env
      shell: sh
      run: |
        echo "=== Available signing identities ==="
        security find-identity -v -p codesigning || true
        security find-identity -v || true

        CODESIGN_ID=$(security find-identity -v -p codesigning \
          | grep "Developer ID Application" | head -1 \
          | sed 's/.*"\(.*\)".*/\1/' || true)
        INSTALLER_ID=$(security find-identity -v \
          | grep "Developer ID Installer" | head -1 \
          | sed 's/.*"\(.*\)".*/\1/' || true)

        if [ -z "$CODESIGN_ID" ]; then
          echo "::warning::No Developer ID Application identity found. App will not be signed."
        else
          echo "Using codesign identity: $CODESIGN_ID"
        fi

        echo "LOGSQUIRL_CODESIGN=${CODESIGN_ID}" >> $GITHUB_ENV
        echo "LOGSQUIRL_INSTALLERSIGN=${INSTALLER_ID:-$CODESIGN_ID}" >> $GITHUB_ENV
        echo "LOGSQUIRL_DMG=logsquirl-mac-${{ env.LOGSQUIRL_ARCH }}.dmg" >> $GITHUB_ENV
        echo "LOGSQUIRL_PKG=logsquirl-mac-${{ env.LOGSQUIRL_ARCH }}.pkg" >> $GITHUB_ENV
        echo "LOGSQUIRL_ENTITLEMENTS=${{ github.workspace }}/packaging/osx/entitlements.plist" >> $GITHUB_ENV

    # ── 4. Code-sign every component individually (inside-out) ────────────
    #
    # Apple requires signing nested code before the outer bundle.
    # Using --deep is unreliable — we sign frameworks, dylibs, helpers,
    # and the main binary one by one, with hardened-runtime entitlements.
    - name: Mac codesign binaries
      if: ${{ github.event_name != 'pull_request' && env.LOGSQUIRL_CODESIGN != '' }}
      shell: sh
      run: |
        set -euo pipefail
        cd "$LOGSQUIRL_BUILD_ROOT"
        APP="./output/logsquirl.app"
        SIGN="${{ env.LOGSQUIRL_CODESIGN }}"
        ENT="${{ env.LOGSQUIRL_ENTITLEMENTS }}"

        echo "::group::Signing individual components"

        # 4a. Sign every framework bundle (sign Versions/A, the canonical path)
        find "$APP/Contents/Frameworks" -name '*.framework' -maxdepth 1 2>/dev/null | while read -r fw; do
          echo "  Signing framework: $fw"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENT" \
            --sign "$SIGN" "$fw/Versions/A"
        done

        # 4b. Sign loose dylibs inside Frameworks/
        find "$APP/Contents/Frameworks" -name '*.dylib' -maxdepth 1 2>/dev/null | while read -r lib; do
          echo "  Signing dylib: $lib"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENT" \
            --sign "$SIGN" "$lib"
        done

        # 4c. Sign Qt plug-in bundles
        find "$APP/Contents/PlugIns" -name '*.dylib' 2>/dev/null | while read -r plug; do
          echo "  Signing plug-in: $plug"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENT" \
            --sign "$SIGN" "$plug"
        done

        # 4d. Sign helper executables (crashpad handler, minidump_dump, etc.)
        find "$APP/Contents/MacOS" -type f -perm +111 ! -name 'logsquirl' 2>/dev/null | while read -r helper; do
          echo "  Signing helper: $helper"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENT" \
            --sign "$SIGN" "$helper"
        done

        # 4e. Sign the main executable
        echo "  Signing main binary"
        codesign --force --options runtime --timestamp \
          --entitlements "$ENT" \
          --sign "$SIGN" "$APP/Contents/MacOS/logsquirl"

        # 4f. Sign the outer app bundle
        echo "  Signing app bundle"
        codesign --force --options runtime --timestamp \
          --entitlements "$ENT" \
          --sign "$SIGN" "$APP"

        echo "::endgroup::"

        # Verify the signature
        echo "=== Verify signature ==="
        codesign --verify --deep --strict --verbose=2 "$APP"
        echo "=== Verify Gatekeeper acceptance ==="
        spctl --assess --type execute --verbose "$APP" || echo "::warning::spctl assess failed (expected without notarization)"

    # ── 5. Notarize the APP itself (not just the DMG) ────────────────────
    #
    # Stapling the notarization ticket directly onto the .app ensures
    # Gatekeeper accepts it even when extracted from the DMG or downloaded
    # as a raw artifact. Without this, only the DMG carries the ticket.
    - name: Mac notarize app
      if: ${{ github.event_name != 'pull_request' && env.LOGSQUIRL_CODESIGN != '' }}
      shell: sh
      run: |
        set -euo pipefail
        cd "$LOGSQUIRL_BUILD_ROOT"

        # notarytool accepts ZIP — create a temporary zip of the signed app
        ditto -c -k --keepParent ./output/logsquirl.app ./output/logsquirl-notarize.zip

        xcrun notarytool submit --wait \
          --apple-id "${{ inputs.notarization-username }}" \
          --team-id "${{ inputs.notarization-team }}" \
          --password "${{ inputs.notarization-password }}" \
          ./output/logsquirl-notarize.zip \
          | tee app_notary.log

        app_status=$(grep -i "status:" app_notary.log | tail -1 | awk '{print $NF}')
        app_notary_id=$(awk '$1=="id:"{id=$2} END{print id}' app_notary.log)

        xcrun notarytool log \
          --apple-id "${{ inputs.notarization-username }}" \
          --team-id "${{ inputs.notarization-team }}" \
          --password "${{ inputs.notarization-password }}" \
          "$app_notary_id" "app_notary.log.json" || true
        echo "=== App notarization log ==="
        cat "app_notary.log.json" || true

        if [ "$app_status" != "Accepted" ]; then
          echo "::error::App notarization failed with status: $app_status"
          exit 1
        fi

        rm -f ./output/logsquirl-notarize.zip

    - name: Mac staple app
      if: ${{ github.event_name != 'pull_request' && env.LOGSQUIRL_CODESIGN != '' }}
      shell: sh
      run: |
        xcrun stapler staple "$LOGSQUIRL_BUILD_ROOT/output/logsquirl.app"
        xcrun stapler validate "$LOGSQUIRL_BUILD_ROOT/output/logsquirl.app"
        echo "=== Final app verification ==="
        codesign --verify --deep --strict --verbose=2 "$LOGSQUIRL_BUILD_ROOT/output/logsquirl.app"
        spctl --assess --type execute --verbose "$LOGSQUIRL_BUILD_ROOT/output/logsquirl.app"

    # ── 6. Create the DMG with the stapled app ────────────────────────────
    #
    # We build the DMG manually instead of using CPack DragNDrop because
    # CPack does not create an Applications symlink and the resulting DMG
    # window appears empty with the bundled DS_Store.
    # The app is already signed, notarized, and stapled at this point.
    - name: Install create-dmg
      shell: sh
      run: |
        brew install create-dmg

    - name: Mac pack dmg
      shell: sh
      run: |
        set -euo pipefail
        cd "$LOGSQUIRL_BUILD_ROOT"
        mkdir -p packages

        # create-dmg handles: Applications symlink, background image,
        # icon positions, volume icon, window size.
        create-dmg \
          --volname "LogSquirl" \
          --volicon "${{ github.workspace }}/Resources/logsquirl.icns" \
          --background "${{ github.workspace }}/packaging/osx/dmg_background.tif" \
          --window-pos 400 100 \
          --window-size 500 365 \
          --icon-size 128 \
          --icon "logsquirl.app" 133 200 \
          --icon "Applications" 378 200 \
          --hide-extension "logsquirl.app" \
          --no-internet-enable \
          --app-drop-link 378 200 \
          "./packages/${{ env.LOGSQUIRL_DMG }}" \
          "./output/logsquirl.app"

        echo "DMG created: $(ls -lh ./packages/${{ env.LOGSQUIRL_DMG }})"

    # ── 7. Sign and notarize the DMG ──────────────────────────────────────
    - name: Mac codesign dmg
      if: ${{ github.event_name != 'pull_request' && env.LOGSQUIRL_CODESIGN != '' }}
      shell: sh
      run: |
        cd "$LOGSQUIRL_BUILD_ROOT"
        codesign --force --timestamp \
          --sign "${{ env.LOGSQUIRL_CODESIGN }}" \
          "./packages/${{ env.LOGSQUIRL_DMG }}"

    - name: Mac notarize DMG
      if: ${{ github.event_name != 'pull_request' && env.LOGSQUIRL_CODESIGN != '' }}
      shell: sh
      run: |
        set -euo pipefail
        xcrun notarytool submit --wait \
          --apple-id "${{ inputs.notarization-username }}" \
          --team-id "${{ inputs.notarization-team }}" \
          --password "${{ inputs.notarization-password }}" \
          "${{ env.LOGSQUIRL_BUILD_ROOT }}/packages/${{ env.LOGSQUIRL_DMG }}" \
          | tee dmg_notary.log

        dmg_status=$(grep -i "status:" dmg_notary.log | tail -1 | awk '{print $NF}')
        dmg_notary_id=$(awk '$1=="id:"{id=$2} END{print id}' dmg_notary.log)

        # Always fetch the notarization log for diagnostics
        xcrun notarytool log \
          --apple-id "${{ inputs.notarization-username }}" \
          --team-id "${{ inputs.notarization-team }}" \
          --password "${{ inputs.notarization-password }}" \
          "$dmg_notary_id" "dmg_notary.log.json" || true
        echo "=== Notarization log ==="
        cat "dmg_notary.log.json" || true

        if [ "$dmg_status" != "Accepted" ]; then
          echo "::error::DMG notarization failed with status: $dmg_status"
          exit 1
        fi

    - name: Mac staple DMG
      if: ${{ github.event_name != 'pull_request' && env.LOGSQUIRL_CODESIGN != '' }}
      shell: sh
      run: |
        xcrun stapler staple "${{ env.LOGSQUIRL_BUILD_ROOT }}/packages/${{ env.LOGSQUIRL_DMG }}"
        echo "=== Stapler validation ==="
        xcrun stapler validate "${{ env.LOGSQUIRL_BUILD_ROOT }}/packages/${{ env.LOGSQUIRL_DMG }}"

    # ── 8. Archive app and symbols for CI artifacts ───────────────────────
    #
    # GitHub Actions upload-artifact uses ZIP which destroys symlinks.
    # We tar.gz the .app and .dSym to preserve the framework symlink
    # structure. Without this, downloaded artifacts have broken frameworks
    # and fail Gatekeeper verification.
    - name: Mac archive app and symbols
      shell: sh
      run: |
        cd $LOGSQUIRL_BUILD_ROOT
        tar -czf ./packages/logsquirl-${{ env.LOGSQUIRL_ARCH }}.app.tar.gz -C ./output logsquirl.app
        tar -czf ./packages/logsquirl-${{ env.LOGSQUIRL_ARCH }}.dSym.tar.gz -C ./output logsquirl.dSym
