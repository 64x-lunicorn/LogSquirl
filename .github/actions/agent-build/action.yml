name: "Configure and build"
description: "Generate the build files and build the code"
runs:
  using: "composite"
  steps:

    - name: Prepare compiler env
      shell: sh
      run: |
        echo "CC=${{ matrix.config.cc }}" >> $GITHUB_ENV
        echo "CXX=${{ matrix.config.cxx }}" >> $GITHUB_ENV

    - name: configure
      shell: sh
      run: |
        mkdir $LOGSQUIRL_BUILD_ROOT
        cd $LOGSQUIRL_BUILD_ROOT
        cmake $LOGSQUIRL_CMAKE_OPTS -DCPM_SOURCE_CACHE=$LOGSQUIRL_WORKSPACE/cpm_cache -DLOGSQUIRL_OVERRIDE_MALLOC=OFF $LOGSQUIRL_WORKSPACE

    - name: build
      shell: sh
      run: |
        cmake --build $LOGSQUIRL_BUILD_ROOT -t ci_build