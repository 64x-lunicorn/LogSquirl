name: "Setup agent"
description: ""
runs:
  using: "composite"
  steps:
    - name: Install Ninja
      uses: seanmiddleditch/gha-setup-ninja@v5

    - name: Install Qt
      if: ${{ matrix.config.qt_arch }}
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.config.qt_version }}
        arch: ${{ matrix.config.qt_arch }}
        cache: true
        cache-key-prefix: ${{ matrix.config.os }}-${{ matrix.config.arch }}-${{ matrix.config.qt_version }}-QtCache
        modules: ${{ matrix.config.qt_modules }}
        archives: qtbase qtimageformats qtsvg qttools qttranslations icu

    - name: Set boost env vars
      shell: sh
      run: |
        BOOST_VERSION="1.86.0"
        BOOST_VERSION_UNDERSCORE=$(echo "$BOOST_VERSION" | tr '.' '_')
        echo "BOOST_ROOT=${{github.workspace}}/3rdparty/boost" >> $GITHUB_ENV
        echo "BOOST_URL=https://sourceforge.net/projects/boost/files/boost/${BOOST_VERSION}/boost_${BOOST_VERSION_UNDERSCORE}.tar.bz2/download" >> $GITHUB_ENV
        echo "BOOST_VERSION=$BOOST_VERSION" >> $GITHUB_ENV

    - name: Restore Boost cache
      uses: actions/cache@v4
      id: cache-boost
      with:
        path: ${{env.BOOST_ROOT}}
        key: boost-${{ runner.os }}-${{ env.BOOST_VERSION }}

    - name: Install Boost
      shell: bash
      run: |
        if echo ${{ steps.cache-boost.outputs.cache-hit }} | grep -c "true"
        then
          echo "Using boost from cache"
        else
          echo "Downloading boost"
          if [ "$OS" == "Windows_NT" ]; then
            # fix up paths to be forward slashes consistently
            BOOST_ROOT=$(echo $BOOST_ROOT | sed 's/\\/\//g')
          fi
          mkdir -p $BOOST_ROOT
          curl --progress-bar --location --output $BOOST_ROOT/download.tar.bz2 $BOOST_URL
          7z -o$BOOST_ROOT x $BOOST_ROOT/download.tar.bz2 -y -bd
          7z -o$BOOST_ROOT x $BOOST_ROOT/download.tar -y -bd
          cd $BOOST_ROOT && cp -r boost_*/* .
          rm -rf boost_*/* download.tar.bz2 download.tar
        fi
        


