name: "Set common env vars"
description: ""
runs:
  using: "composite"
  steps:
    - name: Set common env vars
      shell: sh
      run: |
        echo "LOGSQUIRL_WORKSPACE=${{ github.workspace }}" >> $GITHUB_ENV 
        echo "LOGSQUIRL_BUILD_ROOT=build_root" >> $GITHUB_ENV 
        echo "LOGSQUIRL_ARCH=${{ matrix.config.arch }}" >> $GITHUB_ENV 
        echo "LOGSQUIRL_CMAKE_OPTS=-G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLOGSQUIRL_GENERIC_CPU=ON -DLOGSQUIRL_USE_SENTRY=ON -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ${{ matrix.config.cmake_opts }}" >> $GITHUB_ENV

    - name: Set qt env var
      if: "startsWith(matrix.config.qt_version, '5')"
      shell: bash
      run: |
        echo "LOGSQUIRL_QT=Qt5" >> $GITHUB_ENV
        # Resolve Qt5 prefix from available env vars (install-qt-action@v4)
        QT_PREFIX="${Qt5_Dir:-}"
        if [ -z "$QT_PREFIX" ] && [ -n "${Qt5_DIR:-}" ]; then
          QT_PREFIX=$(echo "$Qt5_DIR" | sed 's|[/\\]lib[/\\]cmake[/\\]Qt5[/\\]*$||')
        fi
        if [ -z "$QT_PREFIX" ] && [ -n "${QT_ROOT_DIR:-}" ]; then
          QT_PREFIX="$QT_ROOT_DIR"
        fi
        echo "LOGSQUIRL_QT_DIR=$QT_PREFIX" >> $GITHUB_ENV
        echo "Resolved Qt5 prefix: $QT_PREFIX"
    
    - name: Set qt env var
      if: "startsWith(matrix.config.qt_version, '6')"
      shell: bash
      run: |
        echo "LOGSQUIRL_QT=Qt6" >> $GITHUB_ENV
        # Resolve Qt6 prefix from available env vars (install-qt-action@v4)
        QT_PREFIX="${Qt6_Dir:-}"
        if [ -z "$QT_PREFIX" ] && [ -n "${Qt6_DIR:-}" ]; then
          QT_PREFIX=$(echo "$Qt6_DIR" | sed 's|[/\\]lib[/\\]cmake[/\\]Qt6[/\\]*$||')
        fi
        if [ -z "$QT_PREFIX" ] && [ -n "${QT_ROOT_DIR:-}" ]; then
          QT_PREFIX="$QT_ROOT_DIR"
        fi
        echo "LOGSQUIRL_QT_DIR=$QT_PREFIX" >> $GITHUB_ENV
        echo "Resolved Qt6 prefix: $QT_PREFIX"
