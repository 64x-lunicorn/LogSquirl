name: "Set common env vars"
description: ""
runs:
  using: "composite"
  steps:
    - name: Set common env vars
      shell: sh
      run: |
        echo "LOGSQUIRL_WORKSPACE=${{ github.workspace }}" >> $GITHUB_ENV 
        echo "LOGSQUIRL_BUILD_ROOT=build_root" >> $GITHUB_ENV 
        echo "LOGSQUIRL_ARCH=${{ matrix.config.arch }}" >> $GITHUB_ENV 
        echo "LOGSQUIRL_CMAKE_OPTS=-G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLOGSQUIRL_GENERIC_CPU=ON -DLOGSQUIRL_USE_SENTRY=ON -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ${{ matrix.config.cmake_opts }}" >> $GITHUB_ENV

    - name: Set qt env var
      if: "startsWith(matrix.config.qt_version, '5')"
      shell: sh
      run: |
        echo "LOGSQUIRL_QT=Qt5" >> $GITHUB_ENV 
        echo "LOGSQUIRL_QT_DIR=${{ env.Qt5_Dir }}" >> $GITHUB_ENV
    
    - name: Set qt env var
      if: "startsWith(matrix.config.qt_version, '6')"
      shell: sh
      run: |
        echo "LOGSQUIRL_QT=Qt6" >> $GITHUB_ENV 
        echo "LOGSQUIRL_QT_DIR=${{ env.Qt6_Dir }}" >> $GITHUB_ENV
